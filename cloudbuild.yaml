steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aerocaliper', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aerocaliper']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aerocaliper-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aerocaliper'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--timeout=900'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,PHOENIX_COLLECTOR_ENDPOINT=https://app.phoenix.arize.com/s/vjbeltrani,ARIZE_SPACE_NAME=vjbeltrani,ARIZE_SPACE_ID=U3BhY2U6NDQ2NTQ6eVVFeA=='
      - '--set-secrets'
      - 'GOOGLE_AGENT_PLATFORM_API_KEY=GOOGLE_AGENT_PLATFORM_API_KEY:latest,PHOENIX_API_KEY=PHOENIX_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/aerocaliper'

options:
  logging: CLOUD_LOGGING_ONLY
